services:
  postgres:
    image: postgres:16-alpine
    container_name: horas_complementares_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - horas_complementares_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: horas_complementares_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5051:80"
    depends_on:
      - postgres
    networks:
      - horas_complementares_network

volumes:
  postgres_data:

networks:
  horas_complementares_network:
    driver: bridge